<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{% block title %}2FA System{% endblock %}</title>
<style>
    * { box-sizing: border-box; }
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #1e1e2f, #2b2b44);
        color: #eee;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }
    .card {
        background: #2b2b44;
        padding: 40px;
        border-radius: 14px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        width: 380px;
        text-align: center;
    }
    h1 { font-size: 22px; margin-bottom: 10px; color: #7ee787; }
    p.subtitle { color: #aaa; font-size: 14px; margin-bottom: 25px; }
    input[type=text] {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #444;
        background: #1e1e2f;
        color: #fff;
        font-size: 15px;
    }
    button {
        width: 100%;
        padding: 12px;
        background: #7ee787;
        color: #1e1e2f;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        font-size: 15px;
        cursor: pointer;
        margin-top: 10px;
    }
    button:hover { background: #5fcf6a; }
    a { color: #7ee787; text-decoration: none; }
    .nav { margin-top: 20px; font-size: 14px; }
    .flash { background: #ff6b6b; color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
    .success-box { background: #28a745; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
    .fail-box { background: #ff6b6b; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
    .secret-box {
        background: #1e1e2f;
        padding: 10px;
        border-radius: 8px;
        font-family: monospace;
        word-break: break-all;
        margin: 15px 0;
        border: 1px dashed #555;
    }
    img.qr { margin: 15px 0; border-radius: 8px; }
</style>
</head>
<body>
<div class="card">
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="flash">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
