{% extends "base.html" %}
{% block title %}Registration Successful{% endblock %}
{% block content %}
<h1>✅ Registered!</h1>
<p class="subtitle">Scan this QR code with Google Authenticator or Authy</p>

<img class="qr" src="/{{ qr_image }}" alt="QR Code" width="200">

<p style="font-size:13px; color:#999;">Or enter this secret manually:</p>
<div class="secret-box">{{ secret }}</div>

<a href="{{ url_for('verify') }}"><button>Go to Verify OTP</button></a>
<div class="nav"><a href="{{ url_for('home') }}">← Back to Home</a></div>
{% endblock %}
